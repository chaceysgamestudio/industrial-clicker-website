<!-- Dust particles -->
<script>
const canvas = document.getElementById("dustCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
const PARTICLE_COUNT = 160;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function createParticle() {
  const depth = Math.random();
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: depth * 2 + 0.5,
    speedY: depth * 0.5 + 0.05,
    speedX: (Math.random() - 0.5) * depth * 0.3,
    alpha: depth * 0.4 + 0.1,
    depth: depth
  };
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());

let wind = 0;
let mouse = { x: canvas.width/2, y: canvas.height/2 };
window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  wind += 0.001;

  for (let p of particles) {
    p.x += Math.sin(wind + p.depth*10)*0.2;
    p.y -= p.speedY;

    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 100){ p.x += (dx/dist)*1.5; p.y += (dy/dist)*1.5; }

    if(p.y < -10) { p.y = canvas.height+10; p.x=Math.random()*canvas.width; }
    if(p.x < -10) p.x = canvas.width+10;
    if(p.x > canvas.width+10) p.x = -10;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,180,180,${p.alpha})`;
    ctx.shadowColor="rgba(120,120,120,0.4)";
    ctx.shadowBlur=4;
    ctx.fill();
  }

  ctx.shadowBlur=0;
  requestAnimationFrame(update);
}
update();
</script>

<!-- Satisfying button animations -->
<script>
const buttons = document.querySelectorAll(".squishy-button");
buttons.forEach(btn => {
  const defaultScale = 1;
  const hoverScale = 1.05;
  const clickScale = 0.85;

  btn.style.transform = `scale(${defaultScale})`;

  btn.addEventListener("mouseenter", () => {
    btn.style.transform = `scale(${hoverScale})`;
    btn.style.boxShadow = "0 8px 20px rgba(0,0,0,0.4)";
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = `scale(${defaultScale})`;
    btn.style.boxShadow = "0 5px 10px rgba(0,0,0,0.3)";
  });

  btn.addEventListener("mousedown", () => {
    btn.style.transform = `scale(${clickScale})`;
    btn.style.boxShadow = "0 2px 6px rgba(0,0,0,0.2)";
  });

  btn.addEventListener("mouseup", () => {
    btn.style.transform = `scale(${hoverScale})`;
    btn.style.boxShadow = "0 8px 20px rgba(0,0,0,0.4)";
  });
});
</script>
